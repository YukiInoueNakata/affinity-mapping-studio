name: Build (macOS Universal DMG)

on:
  # Trigger on tag push (e.g., `git push origin v0.1.0`).
  push:
    tags:
      - 'v*'
  # Also allow manual trigger from the GitHub Actions UI.
  workflow_dispatch:

# Allow the default GITHUB_TOKEN to create releases on tag pushes.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Universal Mac DMG
        env:
          # ењµгБЃгБЯгВБ: sync гБѓеЄЄгБЂгВ™гГХ (vite alias гБІ stub гБЂ redirect жЄИ).
          KJ_INCLUDE_SYNC: 'false'
        run: |
          npx tauri build \
            --target universal-apple-darwin \
            --bundles app,dmg

      - name: Locate artifacts
        id: artifacts
        run: |
          ls -la src-tauri/target/universal-apple-darwin/release/bundle/dmg/ || true
          ls -la src-tauri/target/universal-apple-darwin/release/bundle/macos/ || true
          echo "dmg_path=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)" >> $GITHUB_OUTPUT

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: kj-studio-macos-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Create draft GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          body: |
            **KJ Trace Studio (еАЛдЇЇзЙИ)** macOS Universal DMG.

            зД°зљ≤еРН (private personal build).  Gatekeeper гБЃи≠¶еСКгБѓжђ°гБЃжЙЛй†ЖгБІеЫЮйБњ:

            1. Finder гБІ DMG гВТгГЮгВ¶гГ≥гГИ вЖТ `.app` гВТ `/Applications` гБЂгГЙгГ©гГГгВ∞
            2. еИЭеЫЮиµЈеЛХжЩВ Finder гБЃ `/Applications` гБЛгВЙ `.app` гВТ **еП≥гВѓгГ™гГГгВѓ вЖТ йЦЛгБП**
            3. гГАгВ§гВҐгГ≠гВ∞гБІгАМйЦЛгБПгАНгВТжКЉгБЩ

            гБЊгБЯгБѓ Terminal гБІ:
            ```
            xattr -d com.apple.quarantine /Applications/KJ\ Trace\ Studio.app
            ```
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
