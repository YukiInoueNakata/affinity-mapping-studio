name: Build Affinity Mapping Studio (macOS DMG + Windows MSI)

on:
  # Trigger on tag push (e.g., `git push origin v0.2.0`).
  push:
    tags:
      - 'v*'
  # Also allow manual trigger from the GitHub Actions UI.
  workflow_dispatch:

# Allow the default GITHUB_TOKEN to create releases on tag pushes.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            bundles: 'app,dmg'
            artifact-name: kj-studio-macos-universal
            artifact-glob: 'src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: 'x86_64-pc-windows-msvc'
            bundles: 'msi'
            artifact-name: kj-studio-windows-x64-msi
            artifact-glob: 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Tauri build
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

      - name: Create draft GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          body: |
            **Affinity Mapping Studio** ${{ github.ref_name }}

            Tauri 単一クライアント (sync 常時込み・実行時オプトイン)．
            無署名 (private build)．

            ## macOS (Universal DMG)

            1. Finder で DMG をマウント → `Affinity Mapping Studio.app` を `/Applications` へドラッグ
            2. 初回起動: Finder で `.app` を **右クリック → 開く**，ダイアログで「開く」
            3. もしくは Terminal で `xattr -d com.apple.quarantine /Applications/Affinity\ Mapping\ Studio.app`

            ## Windows (MSI)

            1. `.msi` を実行 → SmartScreen が出たら「詳細情報 → 実行」
            2. ウィザードに従ってインストール（管理者権限が必要な場合あり）
          files: |
            ${{ matrix.artifact-glob }}
