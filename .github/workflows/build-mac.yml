name: Build (macOS Universal DMG)

on:
  # Trigger on tag push (e.g., `git push origin v0.1.0`).
  push:
    tags:
      - 'v*'
  # Also allow manual trigger from the GitHub Actions UI.
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Universal Mac DMG
        env:
          # 念のため: sync は常にオフ (vite alias で stub に redirect 済).
          KJ_INCLUDE_SYNC: 'false'
        run: |
          npx tauri build \
            --target universal-apple-darwin \
            --bundles app,dmg

      - name: Locate artifacts
        id: artifacts
        run: |
          ls -la src-tauri/target/universal-apple-darwin/release/bundle/dmg/ || true
          ls -la src-tauri/target/universal-apple-darwin/release/bundle/macos/ || true
          echo "dmg_path=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)" >> $GITHUB_OUTPUT

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: kj-studio-macos-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Create draft GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          body: |
            **KJ Trace Studio (個人版)** macOS Universal DMG.

            無署名 (private personal build).  Gatekeeper の警告は次の手順で回避:

            1. Finder で DMG をマウント → `.app` を `/Applications` にドラッグ
            2. 初回起動時 Finder の `/Applications` から `.app` を **右クリック → 開く**
            3. ダイアログで「開く」を押す

            または Terminal で:
            ```
            xattr -d com.apple.quarantine /Applications/KJ\ Trace\ Studio.app
            ```
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
