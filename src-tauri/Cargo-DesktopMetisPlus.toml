[package]
name = "kj-trace-tauri"
version = "0.1.0"
description = "KJ Trace Studio (Phase 5 — Tauri full migration)."
edition = "2021"
rust-version = "1.77"

[lib]
name = "kj_trace_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Phase 5b (verified by Phase 4c-2 PoC):
zip = { version = "2", default-features = false, features = ["deflate"] }
regex = "1"
encoding_rs = "0.8"
calamine = "0.31"
csv = "1.3"
docx-rs = "0.4"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
